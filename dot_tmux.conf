# Status bar — short oc/cc label when present, full session name otherwise
set -g status-left "[#{?#{==:#{@octmux_label},},#S,#{@octmux_label}}]"
set -g status-right ""
set -g status-left-length 50

# Forward escape sequences (including the terminal bell) from inner programs
# out to the host terminal. Required so OpenCode / Claude Code / Pi bell
# notifications reach Zed when running under tmux.
# https://zed.dev/docs/ai/agent-clients
set -g allow-passthrough on

# Pi uses modified Enter shortcuts; tmux needs extended keys to distinguish
# Enter from Shift+Enter / Ctrl+Enter reliably.
set -g extended-keys on
set -g extended-keys-format csi-u

set -g mouse on

# Forward the wheel to full-screen apps (Claude Code, vim, less…);
# fall back to tmux scrollback only on the normal shell screen.
bind -n WheelUpPane   if -F "#{mouse_any_flag}" "send -M" \
  "if -F '#{alternate_on}' 'send -M' 'select-pane; copy-mode -e; send -M'"
bind -n WheelDownPane if -F "#{mouse_any_flag}" "send -M" \
  "if -F '#{alternate_on}' 'send -M' 'send -M'"
